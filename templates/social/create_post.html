{% extends 'base.html' %}
{% block title %}Create Post{% endblock %}
{% block page_title %}Create Post{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="glass-card p-6">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-4"><label class="form-label">Post Type</label>
        <select name="post_type" class="form-input">
          <option value="general">General</option>
          <option value="notice">Notice</option>
          <option value="news">News</option>
          <option value="question">Question</option>
        </select>
      </div>
      <div class="mb-4"><label class="form-label">Title</label><input type="text" name="title" class="form-input" placeholder="Post title..." required></div>
      <div class="mb-4"><label class="form-label">Content</label><textarea name="content" class="form-input" rows="6" placeholder="Write your post..." required></textarea></div>
      <div class="mb-6"><label class="form-label">Image (optional)</label><input type="file" name="image" class="form-input" accept="image/*"></div>
      <div class="flex gap-3">
        <button type="submit" class="btn-primary"><i class="fas fa-paper-plane mr-2"></i>Publish</button>
        <a href="{% url 'post_list' %}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
