{% extends 'base.html' %}
{% block title %}Report Lost Item{% endblock %}
{% block page_title %}Report Lost Item{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="glass-card p-6">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-4"><label class="form-label">Item Name</label><input type="text" name="item_name" class="form-input" placeholder="e.g. Black wallet, Student ID card" required></div>
      <div class="mb-4"><label class="form-label">Description</label><textarea name="description" class="form-input" rows="4" placeholder="Describe the item in detail..." required></textarea></div>
      <div class="mb-4"><label class="form-label">Found/Lost Location</label><input type="text" name="found_location" class="form-input" placeholder="e.g. Library 2nd floor, Cafeteria"></div>
      <div class="mb-6"><label class="form-label">Image (optional)</label><input type="file" name="image" class="form-input" accept="image/*"></div>
      <div class="flex gap-3">
        <button type="submit" class="btn-primary"><i class="fas fa-plus mr-2"></i>Report Item</button>
        <a href="{% url 'lost_found' %}" class="btn-secondary">Cancel</a>

      </div>
    </form>
  </div>
</div>
{% endblock %}
