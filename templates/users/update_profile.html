{% extends 'base.html' %}
{% block title %}Update Profile{% endblock %}
{% block page_title %}Update Profile{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="glass-card p-7">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div><label class="form-label">First Name</label><input type="text" name="first_name" class="form-input" value="{{ user.first_name }}"></div>
        <div><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-input" value="{{ user.last_name }}"></div>
      </div>
      <div class="mb-4"><label class="form-label">Phone</label><input type="text" name="phone" class="form-input" value="{{ user.phone }}"></div>
      <div class="mb-6"><label class="form-label">Profile Picture</label><input type="file" name="profile_picture" class="form-input" accept="image/*"></div>
      <div class="flex gap-3">
        <button type="submit" class="btn-primary"><i class="fas fa-save mr-2"></i>Save Changes</button>
        <a href="{% url 'profile' %}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
