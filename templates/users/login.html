{% extends 'base.html' %}
{% block title %}Login — CampusHub{% endblock %}
{% block auth_content %}
<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-slate-900 font-bold text-3xl mx-auto mb-4 shadow-xl shadow-emerald-500/20">C</div>
      <h1 class="text-3xl font-bold text-white">Welcome Back</h1>
      <p class="text-slate-400 mt-1 text-sm">Sign in to CampusHub</p>
    </div>
    <div class="glass-card p-8">
      <form method="post">
        {% csrf_token %}
        <div class="mb-5">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <div class="mb-6">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        {% if form.errors %}
          <div class="alert alert-error mb-4"><i class="fas fa-exclamation-circle mr-2"></i>Invalid email or password.</div>
        {% endif %}
        <button type="submit" class="btn-primary w-full text-center py-3 text-base">
          <i class="fas fa-sign-in-alt mr-2"></i>Sign In
        </button>
      </form>
      <p class="text-center text-slate-400 text-sm mt-6">Don't have an account? <a href="{% url 'register' %}" class="text-emerald-400 hover:text-emerald-300 font-semibold">Register</a></p>
    </div>
  </div>
</div>
{% endblock %}
